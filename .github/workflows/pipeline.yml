name: Playwright Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    env:
      BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
      FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
      X_CASE_TOKEN: ${{ secrets.X_CASE_TOKEN }}
      TEST_SUBJECT_PASSWORD: ${{ secrets.TEST_SUBJECT_PASSWORD }}
      JUNIOR_COORDINATOR_PASSWORD: ${{ secrets.JUNIOR_COORDINATOR_PASSWORD }}
      SENIOR_COORDINATOR_PASSWORD: ${{ secrets.SENIOR_COORDINATOR_PASSWORD }}
      TEST_SUBJECT_ROLE: ${{ secrets.TEST_SUBJECT_ROLE }}
      JUNIOR_COORDINATOR_ROLE: ${{ secrets.JUNIOR_COORDINATOR_ROLE }}
      SENIOR_COORDINATOR_ROLE: ${{ secrets.SENIOR_COORDINATOR_ROLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test tests/api --reporter=blob,list

      - name: Upload API blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-blob-report
          path: blob-report/
          if-no-files-found: warn

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-results
          path: test-results/
          if-no-files-found: ignore

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    env:
      BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
      FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
      X_CASE_TOKEN: ${{ secrets.X_CASE_TOKEN }}
      TEST_SUBJECT_PASSWORD: ${{ secrets.TEST_SUBJECT_PASSWORD }}
      JUNIOR_COORDINATOR_PASSWORD: ${{ secrets.JUNIOR_COORDINATOR_PASSWORD }}
      SENIOR_COORDINATOR_PASSWORD: ${{ secrets.SENIOR_COORDINATOR_PASSWORD }}
      TEST_SUBJECT_ROLE: ${{ secrets.TEST_SUBJECT_ROLE }}
      JUNIOR_COORDINATOR_ROLE: ${{ secrets.JUNIOR_COORDINATOR_ROLE }}
      SENIOR_COORDINATOR_ROLE: ${{ secrets.SENIOR_COORDINATOR_ROLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test tests/e2e --project=chromium --reporter=blob,list

      - name: Upload E2E blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-blob-report
          path: blob-report/
          if-no-files-found: warn

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/
          if-no-files-found: ignore

  merge-reports:
    name: Merge Reports & Deploy to Pages
    runs-on: ubuntu-latest
    needs: [test-api, test-e2e]
    if: always()

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-blob-report"
          path: all-blobs/
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blobs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
